# macos-build.yml — MACOS_PORT_SPEC.md Phase 2 (criterion 7, Amendment A2).
#
# THIN WRAPPER (Rule 10): all gate logic lives in .claude/hooks/build_test.sh
# and .claude/hooks/pluginval_gate.sh — this workflow invokes the SAME two
# hooks a local mac box would, plus the CI-only machine gates that have no
# local equivalent yet (auval, lipo universal2 asserts, dylib-absent
# degradation, ad-hoc signing, ditto packaging). Do not duplicate gate
# CONTENT into this file — if the build/test steps need to change, change
# the hooks, not this workflow.
#
# Triggers deliberately narrow (Risk R10 — mac runner minutes bill at 10x):
# workflow_dispatch always available, plus push only when a path that can
# affect the mac build actually changed. No bare "push: branches: [master]".

name: macOS Build

on:
  workflow_dispatch: {}
  push:
    paths:
      - "Source/**"
      - "tests/**"
      - "CMakeLists.txt"
      - ".claude/hooks/build_test.sh"
      - ".claude/hooks/pluginval_gate.sh"
      - ".github/workflows/macos-build.yml"

# One run at a time per ref — avoid burning parallel mac minutes on rapid
# successive pushes (Risk R10).
concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Honored by .claude/hooks/pluginval_gate.sh's mac branch (env-var override
  # first, per MACOS_PORT_SPEC.md file plan).
  PLUGINVAL_BIN: ${{ github.workspace }}/pluginval.app/Contents/MacOS/pluginval
  VST3_BUNDLE: build/GentSampler_artefacts/Release/VST3/GentSampler.vst3
  AU_BUNDLE: build/GentSampler_artefacts/Release/AU/GentSampler.component

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- primary gate: same hook a local mac box would run ----
      - name: Build + ctest (primary gate)
        run: bash .claude/hooks/build_test.sh

      # ---- provision the official mac pluginval release binary ----
      - name: Download pluginval (macOS)
        run: |
          set -euo pipefail
          curl -L -o pluginval_macOS.zip \
            "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip"
          ditto -x -k pluginval_macOS.zip .
          xattr -dr com.apple.quarantine pluginval.app || true
          chmod +x "${PLUGINVAL_BIN}"

      # ---- CI must never let the hook's local auto-skip silently pass ----
      # (a skipped secondary gate in CI = a FAILED run — MACOS_PORT_SPEC.md
      # criterion 7).
      - name: Assert pluginval is present and executable
        run: |
          set -euo pipefail
          if [ ! -x "${PLUGINVAL_BIN}" ]; then
            echo "::error::pluginval binary missing or not executable at ${PLUGINVAL_BIN} — the secondary gate would silently auto-skip. Failing the run per MACOS_PORT_SPEC.md criterion 7."
            exit 1
          fi
          "${PLUGINVAL_BIN}" --version

      # ---- secondary gate: same hook a local mac box would run ----
      - name: pluginval strictness 5 (secondary gate)
        run: bash .claude/hooks/pluginval_gate.sh

      # ---- AU machine gate (criterion 11, Amendment A2: from the FIRST run) ----
      - name: Install AU component + auval
        run: |
          set -euo pipefail
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          cp -R "${AU_BUNDLE}" ~/Library/Audio/Plug-Ins/Components/
          killall -9 AudioComponentRegistrar || true
          auval -v aumu Gsmp Jtgt

      # ---- universal2 asserts (criterion 8): both plugin binaries AND the
      # bundled ORT dylib must all report x86_64 arm64 ----
      - name: lipo universal2 asserts
        run: |
          set -euo pipefail
          check_universal() {
            local path="$1"
            local archs
            archs="$(lipo -archs "$path")"
            echo "lipo -archs $path => $archs"
            if [[ "$archs" != *"x86_64"* || "$archs" != *"arm64"* ]]; then
              echo "::error::$path is not universal2 (got: $archs)"
              exit 1
            fi
          }
          check_universal "${VST3_BUNDLE}/Contents/MacOS/GentSampler"
          check_universal "${AU_BUNDLE}/Contents/MacOS/GentSampler"
          check_universal "${VST3_BUNDLE}/Contents/Frameworks/libonnxruntime.1.18.1.dylib"
          check_universal "${AU_BUNDLE}/Contents/Frameworks/libonnxruntime.1.18.1.dylib"

      # ---- dylib-absent degradation, MACHINE half (criterion 10) ----
      # Copy the built VST3 bundle, strip the ORT dylib, re-ad-hoc-sign, and
      # confirm pluginval still passes (plugin loads, no crash, engine simply
      # reports unavailable — mirrors the Windows missing-DLL behavior).
      - name: Dylib-absent degradation (machine half)
        run: |
          set -euo pipefail
          rm -rf /tmp/GentSampler_nodylib.vst3
          ditto "${VST3_BUNDLE}" /tmp/GentSampler_nodylib.vst3
          rm -f /tmp/GentSampler_nodylib.vst3/Contents/Frameworks/libonnxruntime.1.18.1.dylib
          codesign --force --deep --sign - /tmp/GentSampler_nodylib.vst3
          "${PLUGINVAL_BIN}" --strictness-level 5 --skip-gui-tests --validate /tmp/GentSampler_nodylib.vst3

      # ---- ad-hoc re-sign the SHIPPING bundles AFTER the ORT dylib is
      # inserted (criterion 7 / criterion 15a) — arm64 refuses to run wholly
      # unsigned code at all; this is the private-testing signing half. ----
      - name: Ad-hoc re-sign shipping bundles
        run: |
          set -euo pipefail
          codesign --force --deep --sign - "${VST3_BUNDLE}"
          codesign --force --deep --sign - "${AU_BUNDLE}"

      # ---- package with ditto BEFORE upload (Risk R11 — upload-artifact
      # destroys symlinks/exec bits; never upload a bare bundle tree) ----
      - name: Package bundles (ditto zip)
        run: |
          set -euo pipefail
          mkdir -p dist
          ditto -c -k --keepParent "${VST3_BUNDLE}" dist/GentSampler-vst3-universal2.zip
          ditto -c -k --keepParent "${AU_BUNDLE}" dist/GentSampler-component-universal2.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GentSampler-macOS-universal2
          path: dist/*.zip
          if-no-files-found: error

      # ==================================================================
      # MACOS_PKG_SPEC.md — unsigned .pkg installer (private testing).
      # Runs AFTER ad-hoc re-signing so the payload always holds the FINAL
      # shipping binaries, never a pre-sign copy (ordering is load-bearing —
      # see the spec's file plan). Additive only: every step above is
      # untouched, so a pkg-step failure below still leaves the existing
      # gate diagnostics (build/ctest/pluginval/auval/lipo) intact in the
      # same run.
      # ==================================================================

      # ---- parse <version> from CMakeLists (fail-closed) ----
      # Same discipline as installer/make_installer.bat's /DAppVer parse:
      # never hardcode, exit 1 if the regex doesn't match x.y.z.
      - name: Parse version (fail-closed)
        id: pkgver
        run: |
          set -euo pipefail
          PROJLINE="$(grep -E '^project\(GentSampler VERSION' CMakeLists.txt || true)"
          if [ -z "$PROJLINE" ]; then
            echo "::error::No 'project(GentSampler VERSION ...)' line found in CMakeLists.txt"
            exit 1
          fi
          VER="$(echo "$PROJLINE" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)"
          if [ -z "$VER" ]; then
            echo "::error::Version parse produced an empty result from line: $PROJLINE"
            exit 1
          fi
          echo "Parsed version: $VER"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      # ---- force BundleIsRelocatable = false on both component plists ----
      # The pkgbuild relocatability trap (Risk R-c / spec criterion 2): a
      # relocatable component pkg "updates" a stray copy of the bundle
      # wherever Spotlight last saw one, instead of installing to the
      # declared --install-location. pkgbuild --analyze emits the plist;
      # PlistBuddy (stock at /usr/libexec/PlistBuddy) is Apple's own
      # documented tool for editing pkgbuild component plists, so it's used
      # here rather than plutil.
      - name: Build component pkgs (relocatability forced false)
        env:
          PKGVER: ${{ steps.pkgver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/pkgroot

          # PlistBuddy `Set` only edits EXISTING keys, and pkgbuild --analyze
          # omits BundleIsRelocatable when its default (true) applies — CI run
          # #5 failed on exactly that ("Does Not Exist"). Set-then-Add covers
          # both shapes; the trailing verification makes the forced value
          # observable in the log either way.
          force_not_relocatable() {
            local plist="$1"
            /usr/libexec/PlistBuddy -c "Set :0:BundleIsRelocatable false" "$plist" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Add :0:BundleIsRelocatable bool false" "$plist"
            /usr/libexec/PlistBuddy -c "Print :0:BundleIsRelocatable" "$plist"
          }

          pkgbuild --analyze --root "$(dirname "${AU_BUNDLE}")" au-component.plist
          force_not_relocatable au-component.plist

          pkgbuild --analyze --root "$(dirname "${VST3_BUNDLE}")" vst3-component.plist
          force_not_relocatable vst3-component.plist

          pkgbuild \
            --root "$(dirname "${AU_BUNDLE}")" \
            --component-plist au-component.plist \
            --identifier com.gentsampler.pkg.au \
            --version "${PKGVER}" \
            --install-location /Library/Audio/Plug-Ins/Components \
            dist/pkgroot/au.pkg

          pkgbuild \
            --root "$(dirname "${VST3_BUNDLE}")" \
            --component-plist vst3-component.plist \
            --identifier com.gentsampler.pkg.vst3 \
            --version "${PKGVER}" \
            --install-location /Library/Audio/Plug-Ins/VST3 \
            dist/pkgroot/vst3.pkg

      # ---- compose the distribution pkg ----
      - name: Compose distribution pkg
        env:
          PKGVER: ${{ steps.pkgver.outputs.version }}
        run: |
          set -euo pipefail
          productbuild \
            --package dist/pkgroot/au.pkg \
            --package dist/pkgroot/vst3.pkg \
            "dist/GentSampler-${PKGVER}.pkg"

      # ---- MACHINE GATE (spec criterion 3): expand, assert payload paths,
      # codesign, and universal2 archs on the pkg's own extracted binaries.
      # This proves the payload holds the final ad-hoc re-signed binaries
      # (the step ordering made observable), not pre-sign copies. ----
      - name: pkg machine gate (expand + payload + codesign + lipo asserts)
        env:
          PKGVER: ${{ steps.pkgver.outputs.version }}
        run: |
          set -euo pipefail
          rm -rf dist/pkg-expanded
          pkgutil --expand-full "dist/GentSampler-${PKGVER}.pkg" dist/pkg-expanded

          AU_PAYLOAD="dist/pkg-expanded/au.pkg/Library/Audio/Plug-Ins/Components/GentSampler.component"
          VST3_PAYLOAD="dist/pkg-expanded/vst3.pkg/Library/Audio/Plug-Ins/VST3/GentSampler.vst3"

          if [ ! -d "$AU_PAYLOAD" ]; then
            echo "::error::Expanded pkg payload missing AU bundle at expected path: $AU_PAYLOAD"
            exit 1
          fi
          if [ ! -d "$VST3_PAYLOAD" ]; then
            echo "::error::Expanded pkg payload missing VST3 bundle at expected path: $VST3_PAYLOAD"
            exit 1
          fi
          echo "Payload paths confirmed: $AU_PAYLOAD ; $VST3_PAYLOAD"

          AU_BIN="${AU_PAYLOAD}/Contents/MacOS/GentSampler"
          VST3_BIN="${VST3_PAYLOAD}/Contents/MacOS/GentSampler"

          codesign -dv "$AU_BIN"
          codesign -dv "$VST3_BIN"

          check_pkg_universal() {
            local path="$1"
            local archs
            archs="$(lipo -archs "$path")"
            echo "lipo -archs $path => $archs"
            if [[ "$archs" != *"x86_64"* || "$archs" != *"arm64"* ]]; then
              echo "::error::$path is not universal2 (got: $archs)"
              exit 1
            fi
          }
          check_pkg_universal "$AU_BIN"
          check_pkg_universal "$VST3_BIN"

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: GentSampler-macOS-pkg
          path: dist/GentSampler-*.pkg
          if-no-files-found: error
